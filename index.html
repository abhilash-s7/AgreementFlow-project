<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AgreementFlow</title>
    <style>
      body {
        align-items: center;
        background: #f6f7f9;
        color: #18212f;
        display: grid;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        background: #fff;
        border: 1px solid #d9e0e8;
        border-radius: 8px;
        box-shadow: 0 12px 30px rgba(20, 31, 48, 0.09);
        margin: auto;
        max-width: 640px;
        padding: 28px;
      }

      h1 {
        margin-top: 0;
      }

      code {
        background: #eef2f6;
        border-radius: 5px;
        padding: 2px 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AgreementFlow</h1>
      <p>This version uses a Python backend and SQLite database.</p>
      <p>Run <code>python -m uvicorn backend.main:app --reload</code>, then open <code>http://127.0.0.1:8000</code>.</p>
    </main>
  </body>
</html>
